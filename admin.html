<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Admin Dashboard - Empier Scents" />
    <title>Admin Dashboard - Empier Scents</title>
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="header">
      <nav class="nav-container">
        <a href="index.html" class="logo">EMPIER SCENTS</a>
        <ul class="nav-menu">
          <li><a href="index.html" class="nav-link">Home</a></li>
          <li><a href="products.html" class="nav-link">Products</a></li>
          <li><a href="admin.html" class="nav-link active">Admin</a></li>
          <li>
            <a href="cart.html" class="cart-icon-wrapper">
              <i class="bx bx-shopping-bag"></i>
              <span class="cart-count">0</span>
            </a>
          </li>
        </ul>
        <button class="mobile-menu-toggle">
          <i class="bx bx-menu"></i>
        </button>
      </nav>
    </header>

    <section class="admin-container">
      <div class="container">
        <div class="admin-header">
          <div>
            <h1>Admin Dashboard</h1>
            <p class="section-subtitle">Manage your products and inventory</p>
          </div>
          <div style="display: flex; gap: 1rem; align-items: center">
            <button class="btn btn-primary" onclick="AdminPage.openAddModal()">
              <i class="bx bx-plus"></i>
              <span class="btn-text">Add Product</span>
            </button>
            <button class="btn btn-secondary" onclick="AdminPage.logout()">
              <i class="bx bx-log-out"></i>
              <span class="btn-text">Logout</span>
            </button>
          </div>
        </div>

        <div class="admin-stats" id="adminStats"></div>

        <div class="admin-card">
          <h3>All Products <span class="product-count-badge">0</span></h3>
          <table class="admin-table">
            <thead>
              <tr>
                <th>Image</th>
                <th>Name</th>
                <th>Category</th>
                <th>Price</th>
                <th>Badge</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="productTableBody"></tbody>
          </table>
        </div>
      </div>
    </section>

    <div class="modal" id="loginModal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Admin Login</h2>
          <span
            class="modal-close"
            onclick="
              document.getElementById('loginModal').classList.remove('active')
            "
            >&times;</span
          >
        </div>
        <form
          onsubmit="
            event.preventDefault();
            AdminPage.login(document.getElementById('adminPassword').value);
          "
        >
          <div class="form-group">
            <label for="adminPassword">Admin Password</label>
            <input
              type="password"
              id="adminPassword"
              required
              placeholder="Enter admin password"
            />
          </div>
          <button
            type="submit"
            class="btn btn-primary"
            style="width: 100%; justify-content: center"
          >
            <span class="btn-text">Login</span>
          </button>
        </form>
      </div>
    </div>

    <div class="modal" id="productModal">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="modalTitle">Add Product</h2>
          <span
            class="modal-close"
            onclick="
              document.getElementById('productModal').classList.remove('active')
            "
            >&times;</span
          >
        </div>
        <form onsubmit="AdminPage.saveProduct(event)">
          <input type="hidden" id="editId" />
          <div class="form-group">
            <label for="editName">Product Name</label>
            <input
              type="text"
              id="editName"
              required
              placeholder="Enter product name"
            />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="editCategory">Category</label>
              <select
                id="editCategory"
                style="
                  width: 100%;
                  padding: 1rem;
                  border: 2px solid var(--color-light-gray);
                  border-radius: 12px;
                  font-family: var(--font-body);
                "
              >
                <option value="oil-perfume">Oil Perfume</option>
                <option value="body-spray">Body Spray</option>
                <option value="body-mist">Body Mist</option>
                <option value="roll-on">Roll-On</option>
                <option value="perfume" selected>Perfume</option>
              </select>
            </div>
            <div class="form-group">
              <label for="editPrice">Price (₦)</label>
              <input
                type="number"
                id="editPrice"
                required
                placeholder="Enter price"
                min="0"
              />
            </div>
          </div>
          <div class="form-group">
            <label for="editImage">Image URL</label>
            <input
              type="text"
              id="editImage"
              required
              placeholder="images/product.jpg"
            />
          </div>
          <div class="form-group">
            <label for="editBadge">Badge (Optional)</label>
            <input
              type="text"
              id="editBadge"
              placeholder="e.g., Bestseller, New, Premium"
            />
          </div>
          <button
            type="submit"
            class="btn btn-primary"
            style="width: 100%; justify-content: center"
          >
            <span class="btn-text">Save Product</span>
          </button>
        </form>
      </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/security.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
